name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify source modules load
        run: node --input-type=module -e "import './src/utils.js'; import './src/commands.js';"

  smoke-test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed eBird cache
        env:
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
        run: node --input-type=module -e "import 'dotenv/config'; import fs from 'node:fs/promises'; const url='https://api.ebird.org/v2/ref/taxonomy/ebird?fmt=json'; const apiKey=process.env.EBIRD_API_KEY; if(!apiKey){ throw new Error('Missing EBIRD_API_KEY'); } const res=await fetch(url,{headers:{'X-eBirdApiToken':apiKey}}); if(!res.ok){ throw new Error('eBird request failed: ' + res.status); } const data=await res.json(); await fs.mkdir('data',{recursive:true}); await fs.writeFile('data/ebird-taxonomy.json', JSON.stringify(data, null, 2));"

      - name: Run smoke test
        env:
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
        run: npm run smoke